name: control2gesture
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy
  - pip:
      - mediapipe==0.10.18
      - opencv-python==4.10.0.84
      - pyautogui==0.9.54
      - PyYAML==6.0.2
      # macOS needs the PyObjC Quartz bindings for pyautogui to drive the mouse/keyboard.
      - pyobjc-core==10.3.1; sys_platform == "darwin"
      - pyobjc-framework-Quartz==10.3.1; sys_platform == "darwin"
