# Control2Gesture configuration.
#
# `settings` tunes the camera, the MediaPipe detector, and cursor behaviour.
# `gestures` is a list of entries, each keyed by the [left, right] hand-pose
# pair the recognizer produces. `null` means "no hand on that side", so a
# single-hand gesture is written as [null, <pose>] (right hand) or
# [<pose>, null] (left hand). Any pair not listed here (or mapped to `none`)
# is detected but does nothing. Left/Right follow the on-screen handedness.
#
# Recognized single-hand poses (see src/control2gesture/gesture_recognizer.py):
#   fist, open_palm, pointing, victory, three, four, thumbs_up, pinch
#
# Action types:
#   none         - do nothing
#   move_cursor  - continuous; moves the mouse using the index fingertip
#   left_click   - one-shot; single left click
#   right_click  - one-shot; single right click
#   double_click - one-shot; double left click
#   scroll_up    - continuous; scroll the wheel up by `amount`
#   scroll_down  - continuous; scroll the wheel down by `amount`
#   zoom         - continuous (two-hand); app zoom in/out as the hands move
#                  apart/together (Cmd +/- on macOS, Ctrl +/- elsewhere)
#   volume       - continuous (two-hand); system volume up/down as the hands
#                  move apart/together (media keys; best-effort on macOS)
#   key          - one-shot; press keys in sequence (`keys`)
#   hotkey       - one-shot; press keys together as a chord (`keys`)
#   toggle_control - one-shot; turns every other gesture action on/off. While
#                  off, gestures are still recognized (so this one can turn
#                  control back on) but nothing else fires. Also bound to the
#                  space key in the preview window.
#
# Any gesture entry may also set `stable_frames: N` to override the global
# `settings.stable_frames` for just that pair -- e.g. `1` so a click fires the
# instant the gesture is recognized instead of waiting several frames.

settings:
  camera_index: 0
  frame_width: 1280
  frame_height: 720
  camera_fourcc: MJPG            # most USB webcams need this to hit 30fps at
                                  # 720p; without it many fall back to a slow
                                  # uncompressed format. Set to "" to leave the
                                  # camera's default alone.
  flip_horizontal: true          # mirror view so movement feels natural
  max_hands: 2                   # 2 enables two-hand gestures (e.g. zoom)
  model_complexity: 0            # 0=lite (fast, recommended for real-time),
                                  # 1=full (more accurate, noticeably slower on
                                  # CPU -- MediaPipe Hands has no GPU/CUDA path
                                  # on desktop Linux, so a discrete GPU doesn't
                                  # speed this up)
  detection_confidence: 0.7
  tracking_confidence: 0.6

  # Cursor control.
  cursor_smoothing: 0.5          # 0 = raw/jittery, ~0.9 = very smooth/laggy
  cursor_sensitivity: 2.0        # relative move_cursor gain: how many screen-widths
                                  # the cursor travels per full-frame fingertip swipe;
                                  # higher = faster cursor movement per hand motion
  # Closed-hand / pinch tuning. Each has its own independent knob (tuning fist
  # no longer affects pointing/victory/three/four/open_palm sensitivity), plus
  # an optional per-hand override below if one hand needs different values.
  pinch_threshold: 0.09          # normalized thumb-index distance to count as a pinch
  fist_fold_margin: 0.05         # slack added to the finger-folded check; higher
                                  # makes fist require a clearer close, so a pinch's
                                  # naturally curled other fingers aren't misread as fist
  thumb_clear_margin: 0.5        # how far the thumb tip must be from the folded index/
                                  # middle tips to read a closed hand as thumbs_up instead
                                  # of fist, as a multiple of the hand's own size (wrist to
                                  # middle knuckle) rather than a fixed distance -- so the
                                  # same value works whether the hand is close to or far
                                  # from the camera. Raise it if fist is misread as
                                  # thumbs_up (thumb not held out clearly enough yet);
                                  # lower it if thumbs_up is misread as fist.

  # Per-hand overrides: uncomment and set only the ones you need to tune
  # separately for that hand. Leave commented/absent to use the shared value
  # above for both hands.
  # pinch_threshold_left: 0.09
  # pinch_threshold_right: 0.09
  # fist_fold_margin_left: 0.05
  # fist_fold_margin_right: 0.05
  # thumb_clear_margin_left: 0.5
  # thumb_clear_margin_right: 0.5

  # A gesture must persist this many consecutive frames before a one-shot
  # action fires (prevents accidental double triggers from a single flickery
  # frame). Per-gesture entries below can override this -- see `left_click`.
  stable_frames: 3

  # Distance-driven two-hand gestures (zoom, volume): how far (normalized) the
  # hands must move to emit one step, and how many key presses each step sends.
  two_hand_deadzone: 0.03
  two_hand_step: 1

  show_window: true              # show the annotated camera preview

gestures:
  # --- Control on/off (also bound to the space key) ---
  - gesture: [four, four]        # both hands showing four fingers
    action: toggle_control

  # --- Single hand (right hand up; left side null) ---
  - gesture: [null, pointing]
    action: move_cursor
  - gesture: [null, pinch]
    action: left_click
    stable_frames: 1              # fire the instant a pinch is recognized, not
                                    # after settings.stable_frames frames of delay
  - gesture: [null, victory]
    action: right_click
  - gesture: [null, thumbs_up]
    action: scroll_up
    amount: 3
  - gesture: [null, three]
    action: scroll_down
    amount: 3

  # --- Two hands, same pose (require max_hands: 2) ---
  - gesture: [pinch, pinch]        # move apart/together to zoom
    action: zoom
  - gesture: [open_palm, open_palm]  # move apart/together for volume
    action: volume
  - gesture: [fist, fist]
    # Both fists -> show desktop / mission control. Customize per OS:
    #   macOS: ["ctrl", "up"] (Mission Control)  Windows: ["win", "d"]
    action: hotkey
    keys: ["ctrl", "up"]
  - gesture: [victory, victory]
    # Both peace signs -> screenshot. Customize per OS:
    #   macOS: ["command", "shift", "4"]  Windows: ["win", "shift", "s"]
    action: hotkey
    keys: ["command", "shift", "4"]

  # --- Two hands, a different pose per hand ---
  # Orientation follows on-screen handedness; if left/right feel swapped, flip
  # the pair (or toggle `flip_horizontal`).
  - gesture: [fist, pointing]
    # Next tab. macOS: ["command", "shift", "]"]  Windows: ["ctrl", "tab"]
    action: hotkey
    keys: ["command", "shift", "]"]
  - gesture: [pointing, fist]
    # Previous tab. macOS: ["command", "shift", "["]  Windows: ["ctrl", "shift", "tab"]
    action: hotkey
    keys: ["command", "shift", "["]
  - gesture: [open_palm, fist]
    # Undo. macOS: ["command", "z"]  Windows: ["ctrl", "z"]
    action: hotkey
    keys: ["command", "z"]
